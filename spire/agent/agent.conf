## SPIRE Agent — local development configuration
##
## Local-dev only. Uses the `join_token` node attestor (token generated by
## scripts/register-test-agent.sh and passed to spire-agent via -joinToken),
## and `unix` workload attestation (UID-based). `insecure_bootstrap = true`
## skips bootstrap-trust-bundle verification — this is acceptable on the
## developer machine but **never** in any deployed environment.

agent {
    data_dir            = "/run/spire/agent/data"
    log_level           = "DEBUG"
    server_address      = "spire-server"
    server_port         = "8081"
    socket_path         = "/run/spire/agent/sock/api.sock"
    trust_domain        = "ai-agents.example.org"

    # Dev-only: skip trust-bundle verification at agent bootstrap.
    # In prod the agent reads a pinned bootstrap bundle from disk.
    insecure_bootstrap  = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    # UID-based workload attestation. Combined with Docker Compose's
    # `user:` directive on each workload container, this lets us bind a
    # SPIFFE ID to a known UID for local development.
    WorkloadAttestor "unix" {
        plugin_data {
            discover_workload_path = true
        }
    }
}

health_checks {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = "8080"
    live_path        = "/live"
    ready_path       = "/ready"
}
