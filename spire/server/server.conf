## SPIRE Server — local development configuration
##
## This is a minimal config sized for the Docker Compose dev stack. It is not
## suitable for any non-development environment; in particular it uses a
## SQLite datastore on a tmpfs volume (effectively in-memory), self-signed
## upstream CA, and the `join_token` node attestor.
##
## See CLAUDE.md for the trust-domain and SVID-TTL invariants this config
## must respect.

server {
    bind_address      = "0.0.0.0"
    bind_port         = "8081"
    socket_path       = "/tmp/spire-server/private/api.sock"
    trust_domain      = "ai-agents.example.org"
    data_dir          = "/run/spire/server/data"
    log_level         = "DEBUG"

    # CA TTL is the lifetime of the upstream CA cert that signs SVIDs.
    # SVID TTLs (per CLAUDE.md): default 1h, never above 4h.
    ca_ttl                  = "168h"
    default_x509_svid_ttl   = "1h"
    default_jwt_svid_ttl    = "30m"

    ca_subject {
        country      = ["US"]
        organization = ["agentauth-dev"]
        common_name  = "ai-agents.example.org"
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/run/spire/server/data/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }
}

health_checks {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = "8080"
    live_path        = "/live"
    ready_path       = "/ready"
}
